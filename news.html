<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local News - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 20px #39ff14aa;
    }

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 3s infinite alternate;
    }

    @keyframes flicker {
      0%, 100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }

    .rss-section {
      margin-top: 2rem;
    }

    .rss-title {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #2ecc40;
      text-align: center;
    }

    .rss-feed {
      background: black;
      border: 2px solid #39ff14;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 15px #39ff14aa;
    }

    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 8px #39ff14aa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      text-decoration: none;
    }

    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }

    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
  </style>
</head>
<body>
  <!-- Matrix Rain -->
  <canvas id="matrix"></canvas>

  <!-- Back Button -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Local News</header>

    <!-- Gringo Gazette Feed -->
    <div class="rss-section">
      <div class="rss-title">📰 Gringo Gazette</div>
      <div class="rss-feed" id="feed1"></div>
    </div>

    <!-- Placeholder Feed 1 -->
    <div class="rss-section">
      <div class="rss-title">📰 Cabo Local Source (placeholder)</div>
      <div class="rss-feed" id="feed2">[Feed loading or replace this manually later]</div>
    </div>

    <!-- Placeholder Feed 2 -->
    <div class="rss-section">
      <div class="rss-title">📰 La Paz Local Source (placeholder)</div>
      <div class="rss-feed" id="feed3">[Feed loading or replace this manually later]</div>
    </div>
  </div>

  <!-- Matrix Script -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "アァイィウヴエカキクケコサシスセソ0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

  <!-- Feed Loading Script (Gringo Gazette only for now) -->
  <script>
    async function loadFeed(containerId, feedUrl) {
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
        const data = await res.json();
        const container = document.getElementById(containerId);
        if (data.items && data.items.length > 0) {
          container.innerHTML = data.items.map(item =>
            `<div style="margin-bottom: 1rem;">
              <a href="${item.link}" target="_blank" style="color: #90ff46; text-decoration: none;">
                <strong>${item.title}</strong>
              </a><br/>
              <small>${new Date(item.pubDate).toLocaleDateString()}</small>
            </div>`
          ).join('');
        } else {
          container.innerHTML = "No articles found.";
        }
      } catch (err) {
        document.getElementById(containerId).innerText = "Error loading feed.";
      }
    }

    loadFeed("feed1", "https://www.gringogazette.com/feed");
    // Future:
    // loadFeed("feed2", "https://another.local.source/rss");
    // loadFeed("feed3", "https://yet.another/source.rss");
  </script>
</body>
</html>
