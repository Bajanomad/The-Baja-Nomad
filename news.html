<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local News - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
    }

    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      70% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 8px #39ff14aa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      text-decoration: none;
    }

    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }

    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    .news-feed {
      width: 100%;
      max-width: 900px;
      margin-bottom: 2rem;
      border: 2px solid #39ff14;
      border-radius: 12px;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 0 15px #39ff14aa;
    }

    .news-feed h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #90ff46;
      text-shadow: 0 0 5px #39ff14aa;
    }

    .news-feed ul {
      list-style: none;
    }

    .news-feed li {
      margin-bottom: 1rem;
    }

    .news-feed a {
      color: #39ff14;
      text-decoration: none;
    }

    .news-feed a:hover {
      text-decoration: underline;
      color: #2ecc40;
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Local News</header>

    <div class="news-feed" id="gringo">
      <h2>Gringo Gazette</h2>
      <ul id="gringo-news">Loading Gringo Gazette...</ul>
    </div>

    <div class="news-feed" id="cabo">
      <h2>Cabo News Today</h2>
      <ul id="cabo-news">Loading Cabo News Today...</ul>
    </div>

    <div class="news-feed" id="baja">
      <h2>Baja Insider</h2>
      <ul id="baja-news">Loading Baja Insider...</ul>
    </div>
  </div>

  <script>
    const feeds = [
      {
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.gringogazette.com%2Ffeed",
        target: "gringo-news"
      },
      {
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fcabonewstoday.com%2Ffeed",
        target: "cabo-news"
      },
      {
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fbajainsider.com%2Ffeed",
        target: "baja-news"
      }
    ];

    feeds.forEach(feed => {
      fetch(feed.url)
        .then(response => response.json())
        .then(data => {
          const container = document.getElementById(feed.target);
          if (data && data.items) {
            container.innerHTML = data.items.slice(0, 5).map(item => `
              <li><a href="${item.link}" target="_blank">${item.title}</a></li>
            `).join('');
          } else {
            container.innerHTML = '<li>No news found.</li>';
          }
        })
        .catch(() => {
          document.getElementById(feed.target).innerHTML = '<li>Failed to load feed.</li>';
        });
    });
  </script>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(window.innerWidth / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);
  </script>

</body>
</html>
