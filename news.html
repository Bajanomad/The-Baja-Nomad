<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local News - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      z-index: 999;
    }
    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
    .content-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.85);
      width: 100%;
    }
    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 0 8px #39ff14;
    }
    .rss-section {
      margin-bottom: 2rem;
      padding: 1rem;
      border: 2px solid #39ff14;
      border-radius: 10px;
      background: black;
      box-shadow: 0 0 12px #39ff14aa;
    }
    .rss-section h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #90ff46;
      text-align: center;
    }
    .rss-item {
      margin-bottom: 1rem;
    }
    .rss-item a {
      color: #39ff14;
      text-decoration: none;
    }
    .rss-item a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body><canvas id="matrix"></canvas>

  <a href="index.html" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>  <div class="content-wrapper">
    <header>Local News</header><!-- Gringo Gazette Feed -->
<div class="rss-section">
  <h2>Gringo Gazette</h2>
  <div id="gringo-feed"></div>
</div>

<!-- Cabo San Lucas Feed Placeholder -->
<div class="rss-section">
  <h2>Cabo San Lucas News</h2>
  <div id="cabo-feed"></div>
</div>

<!-- La Paz Feed Placeholder -->
<div class="rss-section">
  <h2>La Paz News</h2>
  <div id="lapaz-feed"></div>
</div>

  </div>  <script>
    const feeds = [
      {
        id: 'gringo-feed',
        url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.gringogazette.com%2Ffeed'
      },
      {
        id: 'cabo-feed',
        url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fbajasur.news%2Fcabo-san-lucas%2Frss'
      },
      {
        id: 'lapaz-feed',
        url: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fbajasur.news%2Fla-paz%2Frss'
      }
    ];

    feeds.forEach(feed => {
      fetch(feed.url)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById(feed.id);
          if (!data.items || !data.items.length) {
            container.innerHTML = '<p style="color:#ccc">No news available right now.</p>';
            return;
          }
          container.innerHTML = data.items.slice(0, 5).map(item => `
            <div class="rss-item">
              <a href="${item.link}" target="_blank">${item.title}</a>
              <p>${item.pubDate}</p>
            </div>
          `).join('');
        })
        .catch(err => {
          console.error('Feed load failed:', feed.url);
          document.getElementById(feed.id).innerHTML = '<p style="color:#f00">Failed to load feed.</p>';
        });
    });
  </script>  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }
    setInterval(draw, 35);
  </script></body>
</html>
