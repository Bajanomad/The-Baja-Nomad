<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News - The Baja Nomad</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* Reset & Base */
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    /* Matrix Canvas */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Content container */
    .content {
      position: relative;
      z-index: 2;
      padding: 2rem;
      min-height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Page Header */
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 3s infinite alternate;
    }
    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      75% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    /* Back arrow */
    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 8px #39ff14aa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      text-decoration: none;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }
    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    /* News Feed Container */
    .news-feed {
      background: rgba(0,0,0,0.85);
      border: 2px solid #39ff14;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 0 15px #39ff14aa;
      color: #90ff46;
      font-size: 1rem;
      line-height: 1.5;
      max-height: 80vh;
      overflow-y: auto;
    }

    /* Links style inside news feed */
    .news-feed a {
      color: #39ff14;
      text-decoration: none;
    }
    .news-feed a:hover {
      text-decoration: underline;
      color: #2ecc40;
    }
  </style>
</head>
<body>

  <!-- MATRIX BACKGROUND -->
  <canvas id="matrix"></canvas>

  <!-- BACK ARROW -->
  <a href="index.html" class="back-arrow" title="Back to Main">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <!-- MAIN CONTENT -->
  <div class="content">
    <header>Local News</header>

    <!-- PLACEHOLDER FOR RSS FEED -->
    <div class="news-feed" id="news-feed">
      Loading news...
    </div>
  </div>

  <!-- MATRIX RAIN SCRIPT -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for(let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }
    setInterval(draw, 35);

    // Placeholder for fetching RSS feed later (optional)
  </script>

</body>
</html>
