<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
      text-align: center;
    }
    @keyframes flicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }
    .back-arrow {
      position: fixed;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      z-index: 999;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }
    .back-arrow img {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 300px;
    }
    .weather-btn {
      background: black;
      border: 3px solid #39ff14;
      border-radius: 8px;
      padding: 1rem;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.25rem;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 0 15px #39ff14aa;
      transition: all 0.2s ease-in-out;
      user-select: none;
      text-decoration: none;
      display: block;
    }
    .weather-btn:hover {
      background: #000000cc;
      border-color: #2ecc40;
      box-shadow: 0 0 25px #2ecc40cc;
      color: #2ecc40;
    }
  </style>
</head>
<body>

  <!-- Back Arrow -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <header>Weather - The Baja Nomad</header>

  <div class="button-container">
    <a href="https://weather.com/weather/today/l/23.6412,-110.3109" target="_blank" rel="noopener" class="weather-btn" title="La Paz Weather">
      La Paz Weather
    </a>
    <a href="https://weather.com/weather/today/l/22.8905,-109.9126" target="_blank" rel="noopener" class="weather-btn" title="Los Cabos Weather">
      Los Cabos Weather
    </a>
    <a href="https://weather.com/weather/today/l/23.4511,-110.2633" target="_blank" rel="noopener" class="weather-btn" title="Todos Santos Weather">
      Todos Santos Weather
    </a>
  </div>

</body>
</html>
