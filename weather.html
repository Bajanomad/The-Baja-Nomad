<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todos Santos Weather - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ===== GLOBAL STYLES ===== */
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ===== MATRIX BACKGROUND CANVAS ===== */
    canvas#matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== MAIN CONTENT CONTAINER ===== */
    .content {
      position: relative;
      z-index: 1;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== PAGE HEADER ===== */
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
    }
    @keyframes flicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }

    /* ===== BACK ARROW BUTTON ===== */
    .back-arrow {
      position: fixed;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      cursor: pointer;
      text-decoration: none;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }
    .back-arrow img {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    /* ===== WIDGET CONTAINER ===== */
    .widget-container {
      background: rgba(0,0,0,0.85);
      padding: 2rem 3rem;
      border: 2px solid #39ff14;
      border-radius: 12px;
      box-shadow: 0 0 15px #39ff14aa;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- MATRIX RAIN -->
  <canvas id="matrix"></canvas>

  <!-- BACK ARROW -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <!-- PAGE CONTENT -->
  <div class="content">
    <header>Todos Santos Weather - The Baja Nomad</header>

    <div class="widget-container">
      <a class="weatherwidget-io" href="https://forecast7.com/en/23d44n110d26/todos-santos/?unit=us" data-label_1="Todos Santos" data-label_2="WEATHER" data-font="Open Sans" data-icons="Climacons Animated" data-theme="dark" data-textcolor="#d0fb30" >Todos Santos WEATHER</a>
    </div>
  </div>

  <script>
    /* MATRIX RAIN EFFECT */
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    /* WEATHERWIDGET.IO SCRIPT */
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>

</body>
</html>
