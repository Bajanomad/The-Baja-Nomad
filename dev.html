<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Baja Nomad</title>

  <!-- Basic SEO -->
  <meta name="description" content="The Baja Nomad — local news, weather, and my schedule for house sitting & gardening." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">

  <!-- Open Graph for Social Sharing -->
  <meta property="og:title" content="The Baja Nomad" />
  <meta property="og:description" content="Welcome to the Baja Nomad, your one stop shop for local news and weather. You can also see my schedule if you would like to book me for house sitting or gardening." />
  <meta property="og:image" content="https://yourdomain.com/social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; background: #000; font-family: 'Share Tech Mono', monospace; color: #39ff14; overflow-x: hidden; }

    canvas { position: fixed; top: 0; left: 0; z-index: 0; }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem;
      min-height: 100%;
      background: rgba(0,0,0,0.6);
    }

    @keyframes neonFlicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }

    header {
      font-size: 2.4rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1.8rem;
      animation: neonFlicker 2.5s infinite alternate;
      text-align: center;
      white-space: nowrap;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      justify-content: center;
      align-items: center;
      width: 92vw;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Buttons use anchors for proper linking and keyboard support */
    .icon-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 160px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: #000;
      border: 3px solid #39ff14;
      box-shadow: 0 0 8px #39ff14aa, 0 0 15px #39ff14cc;
      cursor: pointer;
      transition: all 0.18s ease;
      padding: 0.5rem;
      text-decoration: none;
      color: inherit;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .icon-btn:focus { box-shadow: 0 0 30px #2ecc40cc, 0 0 40px #39ff14aa; transform: translateY(-2px); }

    .icon-btn img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      pointer-events: none;
    }

    .btn-label {
      margin-top: 0.45rem;
      font-size: 0.95rem;
      color: #39ff14;
      text-shadow: 0 0 6px #39ff14aa;
      pointer-events: none;
    }

    @keyframes glitch {
      0% { transform: translate(0); filter: none; }
      20% { transform: translate(-2px, 2px); filter: drop-shadow(2px 0 #39ff14) drop-shadow(-2px 0 #2ecc40); }
      40% { transform: translate(2px, -2px); filter: drop-shadow(-2px 0 #39ff14) drop-shadow(2px 0 #2ecc40); }
      60% { transform: translate(-1px, 1px); filter: drop-shadow(1px 0 #2ecc40) drop-shadow(-1px 0 #39ff14); }
      80%,100% { transform: translate(0); filter: none; }
    }

    .icon-btn:hover { animation: glitch 0.4s infinite; border-color: #2ecc40; box-shadow: 0 0 25px #2ecc40cc, 0 0 40px #2ecc40aa; }
    .icon-btn:active { transform: scale(0.95); box-shadow: 0 0 10px #2ecc40aa, 0 0 20px #2ecc40aa; }

    /* Small screens: keep it roomy */
    @media (min-width: 700px) {
      .button-grid { grid-template-columns: repeat(4, 1fr); max-width: 900px; gap: 2.5rem; }
      header { font-size: 3rem; }
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <div class="content">
