<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Map - The Baja Nomad</title>

  <!-- Primary Meta -->
  <meta name="description" content="Explore the Baja California Peninsula with an interactive map." />
  <meta name="keywords" content="Baja, map, Baja California, travel" />
  <meta name="author" content="The Baja Nomad" />

  <!-- Open Graph -->
  <meta property="og:title" content="Map - The Baja Nomad" />
  <meta property="og:description" content="Explore the Baja California Peninsula with an interactive map." />
  <meta property="og:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://the-baja-nomad.vercel.app/map.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Map - The Baja Nomad" />
  <meta name="twitter:description" content="Explore the Baja California Peninsula with an interactive map." />
  <meta name="twitter:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />

  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />

  <style>
    .content {
      overflow-y: auto;
      text-align: center;
      padding-top: 5rem;
    }

    .description {
      font-size: 1em;
      margin-bottom: 1.5rem;
      color: #2ecc40cc;
    }

    #map {
      width: 90%;
      max-width: 1000px;
      height: 600px;
      margin: 0 auto 2rem;
      background: #0a0a0a;
      border: 2px solid #39ff14;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 15px #39ff14aa;
    }

    @media (max-width: 768px) {
      #map { height: 400px; }
    }

    @media (max-width: 480px) {
      #map { height: 300px; width: 95%; }
    }

    @media (orientation: landscape) {
      header { font-size: 1.8rem; margin-bottom: 0.5rem; }
      #map { height: 300px; }
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Explore the Baja Peninsula</header>
    <p class="description">Navigate through the vast landscapes and hidden gems of Baja California.</p>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([24.1450, -110.3159], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
  </script>

  <script src="matrix.js"></script>
</body>
</html>
