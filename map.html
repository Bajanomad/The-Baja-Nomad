<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Map - The Baja Nomad</title>

  <!-- Fonts and Leaflet -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      background: black;
    }

    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .back-arrow img {
      width: 40px;
      height: 40px;
    }

    .back-arrow:hover {
      transform: translateX(-5px);
    }

    .content {
      text-align: center;
      padding: 80px 20px 20px;
    }

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2em;
      margin-bottom: 10px;
    }

    .description {
      font-size: 1em;
      margin-bottom: 30px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #map {
      width: 90%;
      max-width: 1000px;
      height: 600px;
      margin: 0 auto;
      background: #0a0a0a;
      border: 2px solid #39ff14;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 15px #39ff14aa;
    }

    @media (max-width: 768px) {
      #map {
        height: 400px;
      }
    }

    @media (max-width: 480px) {
      #map {
        height: 300px;
        width: 95%;
      }
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Explore the Baja Peninsula</header>
    <p class="description">Navigate through the vast landscapes and hidden gems of Baja California.</p>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([24.1450, -110.3159], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
  </script>

  <script>
    // Matrix Rain
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const matrixChars = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;

    const drops = [];
    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 33);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
